<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TechStore Chile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">TechStore</a>

        <div>
            <a class="nav-link d-inline text-white" href="index.html">Home</a>
            <a class="nav-link d-inline text-white" href="carrito.html">
                Carrito <span id="contador" class="badge bg-danger">0</span>
            </a>
        </div>
    </div>
</nav>

<!-- MAIN -->
<main class="container mt-4">

    <h1 class="text-center text-danger mb-4">Productos</h1>

    <div class="row">

        <!-- PRODUCTO 1 -->
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="assets/img/producto1.png" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Laptop Gamer</h5>
                    <p>$800.000</p>
                    <a href="producto.html?producto=1" class="btn btn-primary">Ver más</a>
                    <button class="btn btn-success agregar">Agregar</button>
                </div>
            </div>
        </div>

        <!-- PRODUCTO 2 -->
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="assets/img/producto2.png" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Audífonos</h5>
                    <p>$50.000</p>
                    <a href="producto.html?producto=2" class="btn btn-primary">Ver más</a>
                    <button class="btn btn-success agregar">Agregar</button>
                </div>
            </div>
        </div>

        <!-- PRODUCTO 3 -->
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="assets/img/producto3.png" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Smartphone</h5>
                    <p>$300.000</p>
                    <a href="producto.html?producto=3" class="btn btn-primary">Ver más</a>
                    <button class="btn btn-success agregar">Agregar</button>
                </div>
            </div>
        </div>

    </div>

</main>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-4">
    TechStore Chile - Proyecto Bootcamp
</footer>

<script src="assets/js/script.js"></script>
</body>
</html>
